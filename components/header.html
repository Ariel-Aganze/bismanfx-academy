<header class="bg-[#FFFFFF] border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between h-20">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#EF4444] rounded flex items-center justify-center">
                    <span class="text-white font-bold text-lg">B</span>
                </div>
                <span class="text-[#1F2937] font-bold text-xl tracking-tight">BismanFx.</span>
            </a>

            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-[#1F2937] transition">Accueil</a>
                <a href="about.html" class="text-sm font-medium text-gray-600 hover:text-[#1F2937] transition">À propos</a>
                <a href="plans.html" class="text-sm font-medium text-gray-600 hover:text-[#1F2937] transition">Plans</a>
                <a href="faq.html" class="text-sm font-medium text-gray-600 hover:text-[#1F2937] transition">FAQ</a>
                <a href="support.html" class="text-sm font-medium text-gray-600 hover:text-[#1F2937] transition">Support</a>
                <a href="contact.html" class="text-sm font-medium text-gray-600 hover:text-[#1F2937] transition">Contact</a>
            </nav>

            <!-- CTA -->
            <div class="hidden md:block">
                <a href="plans.html" class="bg-[#EF4444] text-white text-sm font-medium px-5 py-2.5 rounded hover:bg-red-600 transition shadow-sm">
                    Rejoindre l'Académie
                </a>
            </div>

            <!-- Mobile Btn -->
            <button id="mobile-menu-btn" class="md:hidden text-[#1F2937] focus:outline-none">
                <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-[#FFFFFF] border-t border-gray-100">
        <div class="px-6 py-4 flex flex-col space-y-4">
            <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-[#EF4444] transition">Accueil</a>
            <a href="about.html" class="text-sm font-medium text-gray-600 hover:text-[#EF4444] transition">À propos</a>
            <a href="plans.html" class="text-sm font-medium text-gray-600 hover:text-[#EF4444] transition">Plans</a>
            <a href="faq.html" class="text-sm font-medium text-gray-600 hover:text-[#EF4444] transition">FAQ</a>
            <a href="support.html" class="text-sm font-medium text-gray-600 hover:text-[#EF4444] transition">Support</a>
            <a href="contact.html" class="text-sm font-medium text-gray-600 hover:text-[#EF4444] transition">Contact</a>
            <!-- Mobile CTA -->
            <a href="plans.html" class="bg-[#EF4444] text-white text-sm font-medium px-5 py-2.5 rounded hover:bg-red-600 transition shadow-sm text-center mt-4">
                Rejoindre l'Académie
            </a>
        </div>
    </div>
</header>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', function() {
                if (mobileMenu.classList.contains('hidden')) {
                    mobileMenu.classList.remove('hidden');
                    // Change icon to X
                    menuIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    `;
                } else {
                    mobileMenu.classList.add('hidden');
                    // Change icon back to hamburger
                    menuIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    `;
                }
            });

            // Close menu when clicking on a link
            const mobileLinks = mobileMenu.querySelectorAll('a');
            mobileLinks.forEach(link => {
                link.addEventListener('click', function() {
                    mobileMenu.classList.add('hidden');
                    menuIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    `;
                });
            });

            // Close menu when window is resized to desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth >= 768) { // md breakpoint
                    mobileMenu.classList.add('hidden');
                    menuIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    `;
                }
            });
        }
    });
</script>
